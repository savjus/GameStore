services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Str0ng!Passw0rd"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $${SA_PASSWORD} -C -Q 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=GameStoreDb;User Id=sa;Password=Str0ng!Passw0rd;Encrypt=False;TrustServerCertificate=True;"
    ports:
      - "8080:8080"
    depends_on:
      sqlserver:
        condition: service_healthy

  ui:
    image: nginx:alpine
    volumes:
      - ./gamestore-ui-app:/usr/share/nginx/html:ro
    ports:
      - "8081:80"

  tests:
    build:
      context: .
      dockerfile: Dockerfile
      target: testrunner
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=GameStoreDb;User Id=sa;Password=Str0ng!Passw0rd;Encrypt=False;TrustServerCertificate=True;"
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: "no"
