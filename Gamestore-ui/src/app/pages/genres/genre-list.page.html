<section class="page">
  <div class="page-header">
    <div>
      <h1>genres</h1>
      <p>Manage genre profiles.</p>
    </div>

    <button
      mat-raised-button
      color="primary"
      [routerLink]="['/genres/add']">
      <mat-icon>add</mat-icon>
      Add Genre
    </button>
  </div>

  <mat-card>
    <mat-card-content>

      <div *ngIf="loading" class="loading-container">
        <mat-spinner></mat-spinner>
      </div>

      <table
        mat-table
        [dataSource]="dataSource"
        class="mat-elevation-z1"
        *ngIf="!loading">

        <!-- Name -->
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let genre">
            {{ genre.name }}
          </td>
        </ng-container>
        
        <!-- parentGenreId -->
        <ng-container matColumnDef="parentGenreId">
          <th mat-header-cell *matHeaderCellDef>parentGenreId</th>
          <td mat-cell *matCellDef="let genre">
            {{ genre.parentGenreId }}
          </td>
        </ng-container>
        
        <!-- Actions -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>

          <td mat-cell *matCellDef="let genre">
            <div class="actions">

              <a
                mat-stroked-button
                color="primary"
                [routerLink]="['/genres', genre.id, 'update']">
                <mat-icon>edit</mat-icon>
                Edit
              </a>

              <a
                mat-stroked-button
                color="warn"
                [routerLink]="['/genres', genre.id, 'delete']">
                <mat-icon>delete</mat-icon>
                Delete
              </a>

            </div>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

      </table>

      <mat-paginator
        [pageSize]="10"
        [pageSizeOptions]="[5, 10, 25, 50]"
        showFirstLastButtons>
      </mat-paginator>

      <mat-error *ngIf="errorMessage">
        {{ errorMessage }}
      </mat-error>

    </mat-card-content>
  </mat-card>
</section>
