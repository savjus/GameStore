<section class="page">
  <div class="page-header">
    <div>
      <h1>Games</h1>
      <p>Manage the game catalog and availability.</p>
    </div>

    <button
      mat-raised-button
      color="primary"
      [routerLink]="['/games/add']">

      <mat-icon>add</mat-icon>
      Add Game
    </button>
  </div>

  <mat-card>
    <mat-card-content>

      <div *ngIf="loading" class="loading">
        <mat-progress-spinner diameter="40"></mat-progress-spinner>
      </div>

      <table
        mat-table
        [dataSource]="dataSource"
        class="mat-elevation-z1"
        *ngIf="!loading">

        <!-- Name -->
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let game">
            {{ game.name }}
          </td>
        </ng-container>

        <!-- Key -->
        <ng-container matColumnDef="key">
          <th mat-header-cell *matHeaderCellDef>Key</th>
          <td mat-cell *matCellDef="let game">
            {{ game.key }}
          </td>
        </ng-container>

        <!-- Price -->
        <ng-container matColumnDef="price">
          <th mat-header-cell *matHeaderCellDef>Price</th>
          <td mat-cell *matCellDef="let game">
            {{ game.price }}
          </td>
        </ng-container>

        <!-- Discount -->
        <ng-container matColumnDef="discount">
          <th mat-header-cell *matHeaderCellDef>Discount</th>
          <td mat-cell *matCellDef="let game">
            {{ game.discount }}
          </td>
        </ng-container>

        <!-- Stock -->
        <ng-container matColumnDef="unitInStock">
          <th mat-header-cell *matHeaderCellDef>Stock</th>
          <td mat-cell *matCellDef="let game">
            {{ game.unitInStock }}
          </td>
        </ng-container>

        <!-- Actions -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>

          <td mat-cell *matCellDef="let game">
            <div class="actions">

              <a
                mat-stroked-button
                color="primary"
                [routerLink]="['/games', game.key]">

                <mat-icon>visibility</mat-icon>
                View
              </a>

              <a
                mat-stroked-button
                color="accent"
                [routerLink]="['/games', game.key, 'update']">

                <mat-icon>edit</mat-icon>
                Edit
              </a>

              <a
                mat-stroked-button
                color="warn"
                [routerLink]="['/games', game.key, 'delete']">

                <mat-icon>delete</mat-icon>
                Delete
              </a>

            </div>
          </td>
        </ng-container>

        <!-- Table rows -->
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

      </table>

      <!-- Paginator -->
      <mat-paginator
        [pageSize]="10"
        [pageSizeOptions]="[5, 10, 25]"
        showFirstLastButtons>
      </mat-paginator>

      <mat-error *ngIf="errorMessage">
        {{ errorMessage }}
      </mat-error>

    </mat-card-content>
  </mat-card>
</section>
