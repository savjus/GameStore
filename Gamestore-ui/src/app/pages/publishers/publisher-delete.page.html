<section class="page">
  <div class="page-header">
    <div>
      <h1>Delete Publisher</h1>
      <p>Confirm deletion for publisher {{ id }}.</p>
    </div>

    <button
      mat-stroked-button
      color="primary"
      [routerLink]="['/publishers']">
      <mat-icon>arrow_back</mat-icon>
      Back
    </button>
  </div>

  <mat-card>
    <mat-card-content>

      <p class="warning-text">
        This action cannot be undone.
      </p>

      <div class="form-actions">
        <button
          mat-raised-button
          color="warn"
          (click)="confirmDelete()"
          [disabled]="deleting">

          <mat-icon>delete</mat-icon>
          Delete
        </button>
      </div>

      <mat-progress-bar
        *ngIf="deleting"
        mode="indeterminate">
      </mat-progress-bar>

      <mat-error *ngIf="errorMessage">
        {{ errorMessage }}
      </mat-error>

    </mat-card-content>
  </mat-card>
</section>
