<section class="page">
  <div class="page-header">
    <div>
      <h1>{{ isEdit ? 'Update Publisher' : 'Add Publisher' }}</h1>
      <p>Create or update publisher information.</p>
    </div>

    <button
      mat-stroked-button
      color="primary"
      [routerLink]="['/publishers']">
      <mat-icon>arrow_back</mat-icon>
      Back
    </button>
  </div>

  <mat-card>
    <mat-card-content>

      <form [formGroup]="form" (ngSubmit)="submit()" class="form-grid">

        <!-- Company Name -->
        <mat-form-field appearance="outline" class="field">
          <mat-label>Company Name</mat-label>
          <input matInput formControlName="companyName" placeholder="Company"/>
          <mat-error *ngIf="form.controls['companyName'].touched && form.controls['companyName'].invalid">
            Company name is required.
          </mat-error>
        </mat-form-field>

        <!-- Home Page -->
        <mat-form-field appearance="outline" class="field">
          <mat-label>Home Page</mat-label>
          <input matInput formControlName="homePage" placeholder="https://someWebsite.com"/>
          <mat-error *ngIf="form.controls['homePage'].touched && form.controls['homePage'].invalid">
            Home page is required.
          </mat-error>
        </mat-form-field>

        <!-- Description -->
        <mat-form-field appearance="outline" class="field full">
          <mat-label>Description</mat-label>
          <textarea matInput rows="4" formControlName="description" placeholder="Description"></textarea>
          <mat-error *ngIf="form.controls['description'].touched && form.controls['description'].invalid">
            Description is required.
          </mat-error>
        </mat-form-field>

        <!-- Actions -->
        <div class="form-actions">
          <button
            mat-raised-button
            color="primary"
            type="submit"
            [disabled]="form.invalid || saving">

            <mat-icon>save</mat-icon>
            {{ isEdit ? 'Update' : 'Create' }}
          </button>
        </div>

      </form>

      <mat-progress-bar
        *ngIf="loading"
        mode="indeterminate">
      </mat-progress-bar>

      <mat-error *ngIf="errorMessage">
        {{ errorMessage }}
      </mat-error>

    </mat-card-content>
  </mat-card>
</section>
