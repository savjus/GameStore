<section class="page">
  <div class="page-header">
    <div>
      <h1>{{ isEdit ? 'Update Platform' : 'Add Platform' }}</h1>
      <p>Create or update platform information.</p>
    </div>

    <button
      mat-stroked-button
      color="primary"
      [routerLink]="['/platforms']">
      <mat-icon>arrow_back</mat-icon>
      Back
    </button>
  </div>

  <mat-card>
    <mat-card-content>

      <form [formGroup]="form" (ngSubmit)="submit()" class="form-grid">

        <!-- Type -->
        <mat-form-field appearance="outline" class="field full">
          <mat-label>Type</mat-label>
          <textarea matInput rows="4" formControlName="type" placeholder="Type"></textarea>
          <mat-error *ngIf="form.controls['type'].touched && form.controls['type'].invalid">
            Type is required.
          </mat-error>
        </mat-form-field>

        <!-- Actions -->
        <div class="form-actions">
          <button
            mat-raised-button
            color="primary"
            type="submit"
            [disabled]="form.invalid || saving">

            <mat-icon>save</mat-icon>
            {{ isEdit ? 'Update' : 'Create' }}
          </button>
        </div>

      </form>

      <mat-progress-bar
        *ngIf="loading"
        mode="indeterminate">
      </mat-progress-bar>

      <mat-error *ngIf="errorMessage">
        {{ errorMessage }}
      </mat-error>

    </mat-card-content>
  </mat-card>
</section>
